eval:
  benchmark: mme

inference:
  backbone: emu3
  backbone_cfg:
    model_path: /model_cache/emu3/Emu3-Chat
    emu_root: /workspace/model/Emu3
    vq_hub: /model_cache/emu3/Emu3-VisionTokenizer
    device_map: cuda:0
    device: cuda:0
    torch_dtype: bfloat16
    attn_implementation: flash_attention_2

    generation_cfg:
      max_new_tokens: 1024

mme:
  root: /workspace/src/umm/eval/internvl_chat/eval/mme/Your_Results
  image_root: /workspace/data/mme/MME_Benchmark_release_version
  out_dir: /outputs/mme/emu3
  score_output_path: /outputs/mme/emu3/summary.json
  run_calculation: true

