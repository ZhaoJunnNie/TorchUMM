eval:
  benchmark: mme

inference:
  backbone: ovis_u1
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/ovis_u1/Ovis-U1-3B

    understanding_cfg:
      max_new_tokens: 2048
      do_sample: false

mme:
  root: src/umm/eval/internvl_chat/eval/mme/Your_Results
  image_root: data/mme/MME_Benchmark_release_version
  out_dir: output/mme/ovis_u1
  score_output_path: output/mme/ovis_u1/summary.json
  run_calculation: true
