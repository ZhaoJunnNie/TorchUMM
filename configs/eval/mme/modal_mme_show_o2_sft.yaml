eval:
  benchmark: mme

inference:
  backbone: show-o2
  backbone_cfg:
    version: 2
    model_path: /post_train_model_cache/post_train/show_o2/unwrapped_model
    show_o_root: /workspace/model/Show-o
    vae_path: /model_cache/show_o2/Wan2.1_VAE.pth
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 10
      do_sample: false
      use_clip_vit: true

mme:
  root: /workspace/src/umm/eval/internvl_chat/eval/mme/Your_Results
  image_root: /workspace/data/mme/MME_Benchmark_release_version
  out_dir: /output-apr4/mme/show_o2_sft-underN10
  score_output_path: /output-apr4/mme/show_o2_sft-underN10/summary.json
  run_calculation: true
