eval:
  benchmark: mme

inference:
  backbone: emu3_5
  backbone_cfg:
    model_path: /model_cache/emu3_5/Emu3.5
    vq_path: /model_cache/emu3_5/Emu3.5-VisionTokenizer
    emu3_5_root: /workspace/model/Emu3.5
    use_vllm: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.7
    classifier_free_guidance: 2.0
    image_area: 518400

    generation_cfg:
      classifier_free_guidance: 2.0
      max_new_tokens: 512

    understanding_cfg:
      image_area: 518400

mme:
  root: /datasets/mme/Your_Results
  image_root: /datasets/mme/MME_Benchmark_release_version
  out_dir: /outputs/mme/emu3_5
  score_output_path: /outputs/mme/emu3_5/summary.json
  run_calculation: true
