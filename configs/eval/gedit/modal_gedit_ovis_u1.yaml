eval:
  benchmark: gedit

gedit:
  data_root: /datasets/gedit/GEdit-Bench
  out_dir: /output-apr4/gedit/ovis_u1
  mode: full
  resume: true
  model_name: ovis_u1
  score_model: wise
  score_gpu: "A100-80GB:3"
  instruction_language: all
  task_type: all
  run_calculate: true
  score_output_path: /output-apr4/gedit/ovis_u1/summary.json
  vlm_eval:
    backbone: qwen25vl
    model_path: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct

inference:
  backbone: ovis_u1
  backbone_cfg:
    model_path: /model_cache/ovis_u1/Ovis-U1-3B
    editing_cfg:
      num_steps: 50
      txt_cfg: 6.0
      img_cfg: 1.5
      seed: 42
