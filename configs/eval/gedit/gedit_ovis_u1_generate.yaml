eval:
  benchmark: gedit

gedit:
  data_root: ${UMM_DATASETS}/gedit/GEdit-Bench
  out_dir: output/gedit/ovis_u1
  mode: generate
  resume: true
  model_name: ovis_u1
  instruction_language: all
  task_type: all
  run_calculate: true
  score_output_path: output/gedit/ovis_u1/summary.json
  vlm_eval:
    backbone: qwen25vl
    model_path: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct

inference:
  backbone: ovis_u1
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/ovis_u1/Ovis-U1-3B
    editing_cfg:
      num_steps: 50
      txt_cfg: 6.0
      img_cfg: 1.5
