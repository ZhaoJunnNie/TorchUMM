eval:
  benchmark: gedit

gedit:
  data_root: /datasets/gedit/GEdit-Bench
  out_dir: /output-apr4/gedit/bagel_unicot
  mode: full  # full | generate | score
  resume: true
  model_name: bagel
  score_model: wise
  score_gpu: "A100-80GB:3"
  instruction_language: all  # all | en | cn
  task_type: all
  run_calculate: true
  score_output_path: /output-apr4/gedit/bagel_unicot/summary.json
  vlm_eval:
    backbone: qwen25vl
    model_path: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct

inference:
  backbone: bagel
  backbone_cfg:
    model_path: /post_train_model_cache/post_train/unicot/merge/
    bagel_root: /workspace/model/Bagel
    max_mem_per_gpu: "80GiB"
    offload_folder: ./tmp/offload
    seed: 42
    editing_cfg:
      cfg_text_scale: 4.0
      cfg_img_scale: 2.0
      num_timesteps: 50
