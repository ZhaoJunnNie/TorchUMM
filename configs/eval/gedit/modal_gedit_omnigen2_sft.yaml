eval:
  benchmark: gedit
gedit:
  data_root: /datasets/gedit/GEdit-Bench
  out_dir: /output-apr4/gedit/omnigen2_sft
  mode: full  # full | generate | score
  resume: true
  model_name: omnigen2_sft
  score_model: wise  # VLM scoring runs in wise image (has transformers + qwen_vl_utils)
  score_gpu: "A100-80GB:3"
  instruction_language: all  # all | en | cn
  task_type: all
  run_calculate: true
  score_output_path: /output-apr4/gedit/omnigen2_sft/summary.json
  vlm_eval:
    backbone: qwen25vl
    model_path: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct

inference:
  backbone: omnigen2
  backbone_cfg:
    model_path: /post_train_model_cache/post_train/omnigen2/
    omnigen2_root: /workspace/model/OmniGen2
    device: "cuda:0"
    torch_dtype: bfloat16
    generation_cfg:
      num_inference_steps: 50
      text_guidance_scale: 4.0
      seed: 42
