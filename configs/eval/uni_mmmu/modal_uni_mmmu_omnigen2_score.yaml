eval:
  benchmark: uni_mmmu

inference:
  backbone: omnigen2
  backbone_cfg:
    model_path: /model_cache/omnigen2/OmniGen2
    omnigen2_root: /workspace/model/OmniGen2

uni_mmmu:
  data_root: /datasets/uni_mmmu/Uni-MMMU-Eval/data
  tasks: all
  mode: score
  out_dir: /outputs/uni_mmmu/omnigen2
  max_samples: 0
  resume: true
  score_output_path: /outputs/uni_mmmu/omnigen2/overall_summary.json
  scoring:
    qwen3_model: /model_cache/evaluator/Qwen3-32B
    qwen2_5_vl_model: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    dreamsim_cache: /model_cache/dreamsim
