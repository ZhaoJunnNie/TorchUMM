eval:
  benchmark: uni_mmmu

inference:
  backbone: omnigen2
  backbone_cfg:
    model_path: /model_cache/omnigen2/OmniGen2
    omnigen2_root: /workspace/model/OmniGen2
    device: "cuda:0"
    torch_dtype: bfloat16
    output_dir_t2i: /outputs/omnigen2_images
    output_dir_editing: /outputs/omnigen2_editing

uni_mmmu:
  data_root: /datasets/uni_mmmu/Uni-MMMU-Eval/data
  tasks: all
  out_dir: /outputs/uni_mmmu/omnigen2
  max_samples: 0
  resume: true
  score_output_path: /outputs/uni_mmmu/omnigen2/overall_summary.json
