eval:
  benchmark: uni_mmmu

inference:
  backbone: show-o2
  backbone_cfg:
    model_path: /model_cache/show_o2/show-o2-7B
    show_o_root: /workspace/model/Show-o
    vae_path: /model_cache/show_o2/Wan2.1_VAE.pth

uni_mmmu:
  data_root: /datasets/uni_mmmu/Uni-MMMU-Eval/data
  tasks: [science, math_geo, code_rendering]
  mode: score
  out_dir: /outputs/uni_mmmu/show_o2
  max_samples: 0
  resume: true
  score_output_path: /outputs/uni_mmmu/show_o2/overall_summary.json
  scoring:
    qwen3_model: /model_cache/evaluator/Qwen3-32B
    qwen2_5_vl_model: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    dreamsim_cache: /model_cache/dreamsim
