eval:
  benchmark: uni_mmmu

inference:
  backbone: janus_pro
  backbone_cfg:
    model_path: /model_cache/janus_pro/Janus-Pro-7B
    janus_root: /workspace/src/umm/backbones/janus_pro/Janus
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      temperature: 1.0
      parallel_size: 4
      cfg_weight: 5.0
      image_token_num_per_image: 576
      img_size: 384
      patch_size: 16
    understanding_cfg:
      max_new_tokens: 2048
      do_sample: false
      use_cache: true

uni_mmmu:
  mode: score
  data_root: /datasets/uni_mmmu/Uni-MMMU-Eval/data
  tasks: [code_rendering]  # no editing support; science/math_geo need initial image (editing)
  out_dir: /outputs/uni_mmmu/janus_pro
  max_samples: 0
  resume: true
  scoring:
    qwen3_model: /model_cache/evaluator/Qwen3-32B
    qwen2_5_vl_model: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    dreamsim_cache: /model_cache/dreamsim
