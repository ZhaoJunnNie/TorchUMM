eval:
  benchmark: uni_mmmu

inference:
  backbone: show_o
  backbone_cfg:
    model_path: /model_cache/show_o/show-o-w-clip-vit-512x512
    show_o_root: /workspace/model/Show-o

uni_mmmu:
  data_root: /datasets/uni_mmmu/Uni-MMMU-Eval/data
  tasks: [science, math_geo, code_rendering]
  mode: score
  out_dir: /outputs/uni_mmmu/show_o
  max_samples: 0
  resume: true
  score_output_path: /outputs/uni_mmmu/show_o/overall_summary.json
  scoring:
    qwen3_model: /model_cache/evaluator/Qwen3-32B
    qwen2_5_vl_model: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    dreamsim_cache: /model_cache/dreamsim
