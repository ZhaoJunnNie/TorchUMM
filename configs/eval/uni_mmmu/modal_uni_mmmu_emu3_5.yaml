eval:
  benchmark: uni_mmmu

inference:
  backbone: emu3_5
  backbone_cfg:
    model_path: /model_cache/emu3_5/Emu3.5
    vq_path: /model_cache/emu3_5/Emu3.5-VisionTokenizer
    emu3_5_root: /workspace/model/Emu3.5
    use_vllm: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.7
    classifier_free_guidance: 2.0
    image_area: 518400

uni_mmmu:
  data_root: /datasets/uni_mmmu/Uni-MMMU-Eval/data
  tasks: [science, math_geo, code_rendering]
  out_dir: /outputs/uni_mmmu/emu3_5
  max_samples: 0
  resume: true
  score_output_path: /outputs/uni_mmmu/emu3_5/overall_summary.json
