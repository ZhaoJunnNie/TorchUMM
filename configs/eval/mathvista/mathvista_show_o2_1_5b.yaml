eval:
  benchmark: mathvista

inference:
  backbone: show_o2
  backbone_cfg:
    version: 2
    model_path: ${UMM_MODEL_CACHE}/show_o2/show-o2-1.5B
    show_o_root: ${UMM_CODEBASE}/model/Show-o
    vae_path: ${UMM_MODEL_CACHE}/show_o2/Wan2.1_VAE.pth
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 300
      do_sample: false
      use_clip_vit: true

mathvista:
  mode: generate
  resume: true
  gt_file: data/MathVista/annot_testmini.json
  root: AI4Math/MathVista
  cache_dir: data/MathVista
  datasets: [MathVista_testmini]
  out_dir: output/mathvista/show_o2_1_5b
  score_output_path: output/mathvista/show_o2_1_5b/summary.json
  llm_extract:
    model_path: ${UMM_MODEL_CACHE}/evaluator/Qwen3-32B-AWQ
    max_new_tokens: 2048
