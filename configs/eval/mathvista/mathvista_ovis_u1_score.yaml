eval:
  benchmark: mathvista

inference:
  backbone: ovis_u1

mathvista:
  mode: score
  resume: true
  gt_file: data/MathVista/annot_testmini.json
  datasets: [MathVista_testmini]
  out_dir: output/mathvista/ovis_u1
  score_output_path: output/mathvista/ovis_u1/summary.json
  llm_extract:
    model_path: ${UMM_MODEL_CACHE}/evaluator/Qwen3-32B-AWQ
    max_new_tokens: 2048
