eval:
  benchmark: mathvista

inference:
  backbone: janus_flow
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/janus_flow/JanusFlow-1.3B
    janus_root: ${UMM_CODEBASE}/src/umm/backbones/janus_flow/Janus
    vae_path: ${UMM_MODEL_CACHE}/janus_flow/sdxl-vae
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 2048
      do_sample: false
      use_cache: true

mathvista:
  mode: generate
  resume: true
  gt_file: data/MathVista/annot_testmini.json
  root: AI4Math/MathVista
  cache_dir: data/MathVista
  datasets: [MathVista_testmini]
  out_dir: output/mathvista/janus_flow
  score_output_path: output/mathvista/janus_flow/summary.json
  llm_extract:
    model_path: ${UMM_MODEL_CACHE}/evaluator/Qwen3-32B-AWQ
    max_new_tokens: 2048
