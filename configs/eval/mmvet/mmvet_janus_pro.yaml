eval:
  benchmark: mmvet

inference:
  backbone: janus_pro
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/janus_pro/Janus-Pro-7B
    janus_root: ${UMM_CODEBASE}/model/janus_pro/Janus
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 2048
      do_sample: false
      use_cache: true

mmvet:
  datasets: [mmvet]
  out_dir: output/mmvet/janus_pro
  score_output_path: output/mmvet/janus_pro/summary.json
  dataset_paths:
    image_root: data/mm-vet/mm-vet/images
    question: data/mm-vet/llava-mm-vet.jsonl
