eval:
  benchmark: mmvet

inference:
  backbone: emu3_5
  backbone_cfg:
    model_path: /model_cache/emu3_5/Emu3.5
    vq_path: /model_cache/emu3_5/Emu3.5-VisionTokenizer
    emu3_5_root: /workspace/model/Emu3.5
    use_vllm: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.7
    classifier_free_guidance: 2.0
    image_area: 518400

    generation_cfg:
      classifier_free_guidance: 2.0
      max_new_tokens: 512

    understanding_cfg:
      image_area: 518400

mmvet:
  datasets: [mmvet]
  out_dir: /outputs/mmvet/emu3_5
  score_output_path: /outputs/mmvet/emu3_5/summary.json
  dataset_paths:
    image_root: /datasets/mmvet/images
    question: /datasets/mmvet/llava-mm-vet.jsonl
