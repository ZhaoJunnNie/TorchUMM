eval:
  benchmark: mmvet

inference:
  backbone: emu3_5
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/emu3_5/Emu3.5
    vq_path: ${UMM_MODEL_CACHE}/emu3_5/Emu3.5-VisionTokenizer
    emu3_5_root: ${UMM_CODEBASE}/model/Emu3.5
    use_vllm: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.7
    classifier_free_guidance: 2.0
    image_area: 518400

    generation_cfg:
      classifier_free_guidance: 2.0
      max_new_tokens: 512

    understanding_cfg:
      image_area: 518400

mmvet:
  datasets: [mmvet]
  out_dir: output/mmvet/emu3_5
  score_output_path: output/mmvet/emu3_5/summary.json
  dataset_paths:
    image_root: data/mm-vet/mm-vet/images
    question: data/mm-vet/llava-mm-vet.jsonl
