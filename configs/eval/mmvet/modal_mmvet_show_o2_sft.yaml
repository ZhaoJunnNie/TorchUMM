eval:
  benchmark: mmvet

inference:
  backbone: show-o2
  backbone_cfg:
    version: 2
    model_path: /post_train_model_cache/post_train/show_o2/unwrapped_model
    show_o_root: /workspace/model/Show-o
    vae_path: /model_cache/show_o2/Wan2.1_VAE.pth
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 256
      do_sample: false
      use_clip_vit: true

mmvet:
  datasets: [mmvet]
  out_dir: /output-apr4/mmvet/show_o2_sft-underN256
  score_output_path: /output-apr4/mmvet/show_o2_sft-underN256/summary.json
  dataset_paths:
    image_root: /workspace/data/mm-vet/mm-vet/images
    question: /workspace/data/mm-vet/llava-mm-vet.jsonl
