eval:
  benchmark: mmvet

inference:
  backbone: emu3
  backbone_cfg:
    emu_root: ${UMM_CODEBASE}/model/Emu3
    model_path: BAAI/Emu3-Chat
    vq_hub: BAAI/Emu3-VisionTokenizer
    device_map: cuda:0
    device: cuda:0
    torch_dtype: bfloat16
    attn_implementation: flash_attention_2

    generation_cfg:
      max_new_tokens: 1024

mmvet:
  datasets: [mmvet]
  out_dir: output/mmvet/emu3
  score_output_path: output/mmvet/emu3/summary.json
  dataset_paths:
    image_root: data/mm-vet/mm-vet/images
    question: data/mm-vet/llava-mm-vet.jsonl
