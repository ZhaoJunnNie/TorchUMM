eval:
  benchmark: ueval

inference:
  backbone: janus_pro
  backbone_cfg:
    model_path: /model_cache/janus_pro/Janus-1.3B
    janus_root: /workspace/src/umm/backbones/janus_pro/Janus
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      temperature: 1.0
      parallel_size: 4
      cfg_weight: 5.0
      image_token_num_per_image: 576
      img_size: 384
      patch_size: 16
    understanding_cfg:
      max_new_tokens: 5120
      do_sample: false
      use_cache: true

ueval:
  mode: generate
  hf_dataset: zlab-princeton/UEval
  local_cache: /datasets/ueval/UEval
  domains: all
  out_dir: /output-apr4/ueval/janus-underN5120
  max_samples: 0
  resume: true
  score_output_path: /output-apr4/ueval/janus-underN5120/eval_results.json

  scoring:
    enabled: true
    vl_model: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    text_model: /model_cache/evaluator/Qwen3-32B
  gemini_eval:
    enabled: false

  score_model: wise
  score_gpu: "A100-80GB:3"