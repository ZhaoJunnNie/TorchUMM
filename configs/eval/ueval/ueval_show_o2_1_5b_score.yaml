eval:
  benchmark: ueval

inference:
  backbone: show_o2
  backbone_cfg:
    vae_path: ${UMM_MODEL_CACHE}/show_o2/Wan2.1_VAE.pth
    show_o_root: ${UMM_CODEBASE}/model/Show-o
ueval:
  mode: score
  hf_dataset: zlab-princeton/UEval
  local_cache: ${UMM_DATASETS}/ueval/UEval
  domains: all
  out_dir: output/ueval/show_o2_1_5b
  max_samples: 0
  resume: true
  score_output_path: output/ueval/show_o2_1_5b/eval_results.json
  scoring:
    text_model: ${UMM_MODEL_CACHE}/evaluator/Qwen3-32B
    vl_model: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
