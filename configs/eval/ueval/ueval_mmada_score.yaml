eval:
  benchmark: ueval

inference:
  backbone: mmada
  backbone_cfg:
    mmada_root: ${UMM_CODEBASE}/model/MMaDA
ueval:
  mode: score
  hf_dataset: zlab-princeton/UEval
  local_cache: ${UMM_DATASETS}/ueval/UEval
  domains: all
  out_dir: output/ueval/mmada
  max_samples: 0
  resume: true
  score_output_path: output/ueval/mmada/eval_results.json
  scoring:
    text_model: ${UMM_MODEL_CACHE}/evaluator/Qwen3-32B
    vl_model: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
