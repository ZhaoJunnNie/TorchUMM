eval:
  benchmark: ueval

inference:
  backbone: omnigen2
  backbone_cfg:
    model_path: /model_cache/omnigen2/OmniGen2
    omnigen2_root: /workspace/model/OmniGen2
    device: "cuda:0"
    torch_dtype: bfloat16
    generation_cfg:
      num_inference_steps: 50
      text_guidance_scale: 4.0
    understanding_cfg:
      max_new_tokens: 512
      repetition_penalty: 1.2
      do_sample: true
      temperature: 0.7
      top_p: 0.9

ueval:
  mode: generate
  hf_dataset: zlab-princeton/UEval
  local_cache: /datasets/ueval/UEval
  domains: all
  out_dir: /output-apr4/ueval/omnigen2-wU-underN512-sampling
  max_samples: 0
  resume: true
  score_output_path: /output-apr4/ueval/omnigen2-wU-underN512-sampling/eval_results.json

  scoring:
    enabled: true
    vl_model: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    text_model: /model_cache/evaluator/Qwen3-32B
  gemini_eval:
    enabled: false

  score_model: wise
  score_gpu: "A100-80GB:3"