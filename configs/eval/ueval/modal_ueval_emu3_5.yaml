eval:
  benchmark: ueval

inference:
  backbone: emu3_5
  backbone_cfg:
    model_path: /model_cache/emu3_5/Emu3.5
    vq_path: /model_cache/emu3_5/Emu3.5-VisionTokenizer
    emu3_5_root: /workspace/model/Emu3.5
    use_vllm: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.7
    vq_device: "cuda:0"
    classifier_free_guidance: 3.0
    max_new_tokens: 32768
    image_area: 518400
    seed: 6666

ueval:
  mode: generate
  hf_dataset: zlab-princeton/UEval
  local_cache: /datasets/ueval/UEval
  domains: all
  out_dir: /output-apr4/ueval/emu3_5-underN32768
  max_samples: 0
  resume: true
  score_output_path: /output-apr4/ueval/emu3_5-underN32768/eval_results.json

  scoring:
    enabled: true
    vl_model: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    text_model: /model_cache/evaluator/Qwen3-32B
  gemini_eval:
    enabled: false

  score_model: wise
  score_gpu: "A100-80GB:3"