eval:
  benchmark: ueval

inference:
  backbone: emu3
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/emu3/Emu3-Gen
    vq_hub: ${UMM_MODEL_CACHE}/emu3/Emu3-VisionTokenizer
    emu_root: ${UMM_CODEBASE}/model/Emu3
    device: "cuda:0"
    device_map: "cuda:0"
    torch_dtype: bfloat16
    attn_implementation: flash_attention_2
    seed: 42
    generation_cfg:
      max_new_tokens: 40960
      classifier_free_guidance: 3.0
    understanding_cfg:
      max_new_tokens: 5120
      do_sample: false

ueval:
  mode: full
  hf_dataset: zlab-princeton/UEval
  domains: all
  out_dir: output/ueval/emu3
  max_samples: 0
  resume: true
  score_output_path: output/ueval/emu3/eval_results.json
  scoring:
    text_model: Qwen/Qwen3-32B
    vl_model: Qwen/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
