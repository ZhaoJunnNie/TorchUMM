eval:
  benchmark: ueval

inference:
  backbone: ovis_u1
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/ovis_u1/Ovis-U1-3B
    generation_cfg:
      height: 1024
      width: 1024
      num_steps: 50
      txt_cfg: 5.0
    understanding_cfg:
      max_new_tokens: 5120
      do_sample: false
ueval:
  mode: generate
  hf_dataset: zlab-princeton/UEval
  local_cache: ${UMM_DATASETS}/ueval/UEval
  domains: all
  out_dir: output/ueval/ovis_u1
  max_samples: 0
  resume: true
