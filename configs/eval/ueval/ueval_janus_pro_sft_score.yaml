eval:
  benchmark: ueval

inference:
  backbone: janus_pro
  backbone_cfg: {}
  request:
    params:
      max_new_tokens: 512
      parallel_size: 4

ueval:
  mode: score
  hf_dataset: zlab-princeton/UEval
  domains: all
  out_dir: output/ueval/janus_pro_sft
  max_samples: 0
  resume: true
  score_output_path: output/ueval/janus_pro_sft/eval_results.json
  scoring:
    text_model: Qwen/Qwen3-32B
    vl_model: Qwen/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
