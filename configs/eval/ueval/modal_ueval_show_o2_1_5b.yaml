eval:
  benchmark: ueval

inference:
  backbone: show-o2
  backbone_cfg:
    model_path: /model_cache/show_o2/show-o2-1.5B
    show_o_root: /workspace/model/Show-o
    vae_path: /model_cache/show_o2/Wan2.1_VAE.pth
    version: 2
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      guidance_scale: 3.0
      generation_timesteps: 50
      batch_size: 1
    understanding_cfg:
      max_new_tokens: 5120
      do_sample: false
      use_clip_vit: true

ueval:
  mode: generate
  hf_dataset: zlab-princeton/UEval
  local_cache: /datasets/ueval/UEval
  domains: all
  out_dir: /output-apr4/ueval/show_o2_1_5b-underN5120
  max_samples: 0
  resume: true
  score_output_path: /output-apr4/ueval/show_o2_1_5b-underN5120/eval_results.json

  scoring:
    enabled: true
    vl_model: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    text_model: /model_cache/evaluator/Qwen3-32B
  gemini_eval:
    enabled: false

  score_model: wise
  score_gpu: "A100-80GB:3"