eval:
  benchmark: ueval

inference:
  backbone: show-o2
  backbone_cfg: {}

ueval:
  mode: score
  hf_dataset: zlab-princeton/UEval
  domains: all
  out_dir: output/ueval/show_o2
  max_samples: 0
  resume: true
  score_output_path: output/ueval/show_o2/eval_results.json
  scoring:
    text_model: Qwen/Qwen3-32B
    vl_model: Qwen/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
