eval:
  benchmark: ueval

inference:
  backbone: bagel
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/bagel/BAGEL-7B-MoT
    bagel_root: ${UMM_CODEBASE}/model/Bagel
    max_mem_per_gpu: "80GiB"
    offload_folder: ./tmp/offload
    seed: 42
    generation_cfg:
      think: true
      do_sample: true
      text_temperature: 0.3
      cfg_text_scale: 4.0
      cfg_img_scale: 1.0
      num_timesteps: 50
    understanding_cfg:
      max_think_token_n: 1000
      do_sample: false
ueval:
  mode: full
  hf_dataset: zlab-princeton/UEval
  domains: all
  out_dir: output/ueval/bagel_think
  max_samples: 0
  resume: true
  score_output_path: output/ueval/bagel_think/eval_results.json
  scoring:
    text_model: Qwen/Qwen3-32B
    vl_model: Qwen/Qwen2.5-VL-72B-Instruct
    text_field: text_answer
    image_field: image_answer
