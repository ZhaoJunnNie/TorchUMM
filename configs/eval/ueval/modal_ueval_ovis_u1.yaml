eval:
  benchmark: ueval

inference:
  backbone: ovis_u1
  backbone_cfg:
    model_path: /model_cache/ovis_u1/Ovis-U1-3B
    generation_cfg:
      height: 1024
      width: 1024
      num_steps: 50
      txt_cfg: 5.0
    understanding_cfg:
      max_new_tokens: 5120
      do_sample: false

ueval:
  mode: generate
  hf_dataset: zlab-princeton/UEval
  local_cache: /datasets/ueval/UEval
  domains: all
  out_dir: /output-apr4/ueval/ovis_u1-underN5120
  max_samples: 0
  resume: true
  score_output_path: /output-apr4/ueval/ovis_u1-underN5120/eval_results.json

  scoring:
    enabled: true
    vl_model: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    text_model: /model_cache/evaluator/Qwen3-32B
  gemini_eval:
    enabled: false

  score_model: wise
  score_gpu: "A100-80GB:3"