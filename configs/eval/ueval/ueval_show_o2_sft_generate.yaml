eval:
  benchmark: ueval

inference:
  backbone: show_o2
  backbone_cfg:
    vae_path: ${UMM_MODEL_CACHE}/show_o2/Wan2.1_VAE.pth
    model_path: ${UMM_POST_TRAIN_MODEL_CACHE}/post_train/show_o2/unwrapped_model
    show_o_root: ${UMM_CODEBASE}/model/Show-o
    version: 2
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      guidance_scale: 3.0
      generation_timesteps: 50
      batch_size: 1
    understanding_cfg:
      max_new_tokens: 5120
      do_sample: false
      use_clip_vit: true

ueval:
  mode: generate
  hf_dataset: zlab-princeton/UEval
  local_cache: ${UMM_DATASETS}/ueval/UEval
  domains: all
  out_dir: output/ueval/show_o2_sft
  max_samples: 0
  resume: true
