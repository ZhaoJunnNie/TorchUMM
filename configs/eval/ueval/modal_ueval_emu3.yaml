eval:
  benchmark: ueval

inference:
  backbone: emu3
  backbone_cfg:
    model_path: /model_cache/emu3/Emu3-Gen
    vq_hub: /model_cache/emu3/Emu3-VisionTokenizer
    emu_root: /workspace/model/Emu3
    device: "cuda:0"
    device_map: "cuda:0"
    torch_dtype: bfloat16
    attn_implementation: flash_attention_2
    seed: 42
    generation_cfg:
      max_new_tokens: 40960
      classifier_free_guidance: 3.0
    understanding_cfg:
      max_new_tokens: 5120
      do_sample: false

ueval:
  mode: generate
  hf_dataset: zlab-princeton/UEval
  local_cache: /datasets/ueval/UEval
  domains: all
  out_dir: /output-apr4/ueval/emu3-underN5120
  max_samples: 0
  resume: true
  score_output_path: /output-apr4/ueval/emu3-underN5120/eval_results.json

  scoring:
    enabled: true
    vl_model: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    text_model: /model_cache/evaluator/Qwen3-32B
  gemini_eval:
    enabled: false

  score_model: wise
  score_gpu: "A100-80GB:3"