eval:
  benchmark: ueval

inference:
  backbone: show_o
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/show_o/show-o-w-clip-vit-512x512
    show_o_root: ${UMM_CODEBASE}/model/Show-o
    vq_model_path: ${UMM_MODEL_CACHE}/show_o/magvitv2
    version: 1
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      guidance_scale: 3.0
      generation_timesteps: 50
      batch_size: 1
    understanding_cfg:
      max_new_tokens: 5120
      do_sample: false
      use_clip_vit: true

ueval:
  mode: generate
  hf_dataset: zlab-princeton/UEval
  local_cache: ${UMM_DATASETS}/ueval/UEval
  domains: all
  out_dir: output/ueval/show_o
  max_samples: 0
  resume: true
