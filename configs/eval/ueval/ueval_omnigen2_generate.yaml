eval:
  benchmark: ueval

inference:
  backbone: omnigen2
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/omnigen2/OmniGen2
    omnigen2_root: ${UMM_CODEBASE}/model/OmniGen2
    device: "cuda:0"
    torch_dtype: bfloat16
    generation_cfg:
      num_inference_steps: 50
      text_guidance_scale: 4.0
      seed: 0
    understanding_cfg:
      max_new_tokens: 5120
      do_sample: false

ueval:
  mode: generate
  hf_dataset: zlab-princeton/UEval
  local_cache: ${UMM_DATASETS}/ueval/UEval
  domains: all
  out_dir: output/ueval/omnigen2
  max_samples: 0
  resume: true
