eval:
  benchmark: wise

wise:
  data_root: eval/generation/wise/data
  out_dir: output/wise/janus_pro
  max_samples: 0
  resume: true
  score_output_path: output/wise/janus_pro/summary.json
  mode: full  # full | generate | score
  vlm_eval:
    enabled: true
    model_name: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: janus_pro
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/janus_pro/Janus-Pro-7B
    janus_root: ${UMM_CODEBASE}/src/umm/backbones/janus_pro/Janus
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      temperature: 1.0
      parallel_size: 4
      cfg_weight: 5.0
      image_token_num_per_image: 576
      img_size: 384
      patch_size: 16
