eval:
  benchmark: wise

wise:
  data_root: eval/generation/wise/data
  out_dir: output/wise/omnigen2_sft
  max_samples: 0
  resume: true
  score_output_path: output/wise/omnigen2_sft/summary.json
  mode: score  # full | generate | score
  vlm_eval:
    enabled: true
    model_name: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: omnigen2
  backbone_cfg: {}
  request:
    params:
      num_inference_steps: 50
      text_guidance_scale: 4.0
      seed: 42
