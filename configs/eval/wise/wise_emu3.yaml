eval:
  benchmark: wise
wise:
  data_root: eval/generation/wise/data
  out_dir: output/wise/emu3
  max_samples: 0
  resume: true
  score_output_path: output/wise/emu3/summary.json
  mode: full  # full | generate | score
  vlm_eval:
    enabled: true
    model_name: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: emu3
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/emu3/Emu3-Gen
    vq_hub: ${UMM_MODEL_CACHE}/emu3/Emu3-VisionTokenizer
    emu_root: ${UMM_CODEBASE}/model/Emu3
    device: "cuda:0"
    device_map: "cuda:0"
    torch_dtype: bfloat16
    attn_implementation: flash_attention_2
    generation_cfg:
      max_new_tokens: 40960
      classifier_free_guidance: 3.0
