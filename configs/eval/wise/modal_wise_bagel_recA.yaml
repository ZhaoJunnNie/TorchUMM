eval:
  benchmark: wise
wise:
  data_root: /workspace/model/WISE
  out_dir: /outputs/wise/bagel_recA
  max_samples: 0
  resume: true
  score_output_path: /outputs/wise/bagel_recA/summary.json
  mode: full
  score_model: wise
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true
  score_gpu: A100-80GB:3
inference:
  backbone: bagel
  backbone_cfg:
    model_path: /post_train_model_cache/post_train/recA/
    checkpoint_file: model.safetensors
    bagel_root: /workspace/model/Bagel
    max_mem_per_gpu: 80GiB
    offload_folder: ./tmp/offload
    seed: 42
    generation_cfg:
      cfg_text_scale: 4.0
      cfg_img_scale: 1.0
      num_timesteps: 50
