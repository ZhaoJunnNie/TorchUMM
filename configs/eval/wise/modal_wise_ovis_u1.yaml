eval:
  benchmark: wise

wise:
  data_root: /workspace/model/WISE
  out_dir: /output-apr4/wise/ovis_u1
  max_samples: 0
  resume: true
  score_output_path: /output-apr4/wise/ovis_u1/summary.json
  mode: full
  score_model: wise
  score_gpu: "A100-80GB:3"
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: ovis_u1
  backbone_cfg:
    model_path: /model_cache/ovis_u1/Ovis-U1-3B
    generation_cfg:
      height: 1024
      width: 1024
      num_steps: 50
      txt_cfg: 5.0
