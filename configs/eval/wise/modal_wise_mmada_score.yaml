eval:
  benchmark: wise

wise:
  data_root: /workspace/model/WISE
  out_dir: /outputs/wise/mmada
  max_samples: 0
  resume: true
  score_output_path: /outputs/wise/mmada/summary.json
  mode: score
  score_model: wise
  score_gpu: "A100-80GB:3"
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: mmada
  backbone_cfg:
    model_path: /model_cache/mmada/MMaDA-8B-Base
    mmada_root: /workspace/model/MMaDA
    vq_model_path: /model_cache/mmada/magvitv2
    seed: 42
