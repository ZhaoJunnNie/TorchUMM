eval:
  benchmark: wise
wise:
  data_root: /workspace/model/WISE
  out_dir: /outputs/wise/emu3_5
  max_samples: 0
  resume: true
  score_output_path: /outputs/wise/emu3_5/summary.json
  mode: full  # full | generate | score
  score_model: wise  # VLM scoring runs in this image (needs transformers >= 4.45)
  score_gpu: "A100-80GB:3"
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: emu3_5
  backbone_cfg:
    model_path: /model_cache/emu3_5/Emu3.5-Image
    vq_path: /model_cache/emu3_5/Emu3.5-VisionTokenizer
    emu3_5_root: /workspace/model/Emu3.5
    use_vllm: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.7
    classifier_free_guidance: 5.0
    image_area: 1048576
    generation_cfg:
      max_new_tokens: 5120
      classifier_free_guidance: 5.0
