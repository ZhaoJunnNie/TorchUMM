eval:
  benchmark: wise

wise:
  data_root: /workspace/model/WISE
  out_dir: /outputs/wise/tokenflow
  max_samples: 0
  resume: true
  score_output_path: /outputs/wise/tokenflow/summary.json
  mode: generate  # full | generate | score
  score_model: wise
  score_gpu: "A100-80GB:3"
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: tokenflow
  backbone_cfg:
    model_path: /model_cache/tokenflow/TokenFlow-t2i
    tokenizer_path: /model_cache/tokenflow/TokenFlow/tokenflow_clipb_32k_enhanced.pt
    tokenflow_root: /workspace/model/TokenFlow
    cfg: 7.5
    loop: 1
    mixed_precision: bf16
    batch_size: 1
