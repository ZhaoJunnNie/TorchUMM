eval:
  benchmark: wise
wise:
  data_root: /workspace/model/WISE
  out_dir: /outputs/wise/blip3o
  max_samples: 0
  resume: true
  score_output_path: /outputs/wise/blip3o/summary.json
  mode: full
  score_model: wise
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true
  score_gpu: A100-80GB:3
inference:
  backbone: blip3o
  backbone_cfg:
    model_path: /model_cache/blip3o/BLIP3o-NEXT-SFT-3B
    blip3o_root: /workspace/model/BLIP3o
    device: cuda:0
    torch_dtype: bfloat16
    scale: 0
    seq_len: 729
    top_p: 0.95
    top_k: 1200
