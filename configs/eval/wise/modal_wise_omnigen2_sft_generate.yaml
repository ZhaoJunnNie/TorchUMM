eval:
  benchmark: wise

wise:
  data_root: /workspace/model/WISE
  out_dir: /output-apr4/wise/omnigen2_sft
  max_samples: 0
  resume: true
  score_output_path: /output-apr4/wise/omnigen2_sft/summary.json
  mode: generate
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: omnigen2
  backbone_cfg:
    model_path: /post_train_model_cache/post_train/omnigen2/
    omnigen2_root: /workspace/model/OmniGen2
    device: "cuda:0"
    torch_dtype: bfloat16
    generation_cfg:
      num_inference_steps: 50
      text_guidance_scale: 4.0
      seed: 42
