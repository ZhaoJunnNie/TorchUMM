eval:
  benchmark: wise

wise:
  data_root: eval/generation/wise/data
  out_dir: output/wise/janus_pro
  max_samples: 0
  resume: true
  score_output_path: output/wise/janus_pro/summary.json
  mode: score  # full | generate | score
  vlm_eval:
    enabled: true
    model_name: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: janus_pro
  backbone_cfg: {}
