eval:
  benchmark: wise

wise:
  data_root: /workspace/model/WISE
  out_dir: /outputs/wise/janus_flow
  max_samples: 0
  resume: true
  score_output_path: /outputs/wise/janus_flow/summary.json
  mode: full  # full | generate | score
  score_model: wise
  score_gpu: "A100-80GB:3"
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: janus_flow
  backbone_cfg:
    model_path: /model_cache/janus_flow/JanusFlow-1.3B
    janus_root: /workspace/src/umm/backbones/janus_flow/Janus
    vae_path: /model_cache/janus_flow/sdxl-vae
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      cfg_weight: 2.0
      num_inference_steps: 30
      parallel_size: 5
      img_size: 384
