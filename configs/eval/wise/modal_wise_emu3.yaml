eval:
  benchmark: wise
wise:
  data_root: /workspace/model/WISE
  out_dir: /outputs/wise/emu3
  max_samples: 0
  resume: true
  score_output_path: /outputs/wise/emu3/summary.json
  mode: full  # full | generate | score
  score_model: wise  # VLM scoring runs in this image (needs transformers >= 4.45)
  score_gpu: "A100-80GB:3"
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: emu3
  backbone_cfg:
    model_path: /model_cache/emu3/Emu3-Gen
    vq_hub: /model_cache/emu3/Emu3-VisionTokenizer
    emu_root: /workspace/model/Emu3
    device: "cuda:0"
    device_map: "cuda:0"
    torch_dtype: bfloat16
    attn_implementation: flash_attention_2
    generation_cfg:
      max_new_tokens: 40960
      classifier_free_guidance: 3.0
