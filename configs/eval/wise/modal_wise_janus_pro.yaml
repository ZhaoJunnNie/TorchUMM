eval:
  benchmark: wise

wise:
  data_root: /workspace/model/WISE
  out_dir: /outputs/wise/janus_pro
  max_samples: 0
  resume: true
  score_output_path: /outputs/wise/janus_pro/summary.json
  mode: full  # full | generate | score
  score_model: wise
  score_gpu: "A100-80GB:3"
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: janus_pro
  backbone_cfg:
    model_path: /model_cache/janus_pro/Janus-Pro-7B
    janus_root: /workspace/src/umm/backbones/janus_pro/Janus
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      temperature: 1.0
      parallel_size: 4
      cfg_weight: 5.0
      image_token_num_per_image: 576
      img_size: 384
      patch_size: 16
