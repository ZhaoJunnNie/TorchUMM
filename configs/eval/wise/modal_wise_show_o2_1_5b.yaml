eval:
  benchmark: wise
wise:
  data_root: /workspace/model/WISE
  out_dir: /outputs/wise/show_o2_1_5b
  max_samples: 0
  resume: true
  score_output_path: /outputs/wise/show_o2_1_5b/summary.json
  mode: full  # full | generate | score
  score_model: wise  # VLM scoring runs in this image (needs transformers >= 4.45)
  score_gpu: "A100-80GB:3"
  vlm_eval:
    enabled: true
    model_name: /model_cache/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: show-o2
  backbone_cfg:
    model_path: /model_cache/show_o2/show-o2-1.5B
    show_o_root: /workspace/model/Show-o
    vae_path: /model_cache/show_o2/Wan2.1_VAE.pth
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      guidance_scale: 3.0
      generation_timesteps: 50
      batch_size: 1
