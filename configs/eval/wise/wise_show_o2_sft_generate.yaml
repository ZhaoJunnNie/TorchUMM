eval:
  benchmark: wise
wise:
  data_root: eval/generation/wise/data
  out_dir: output/wise/show_o2_sft
  max_samples: 0
  resume: true
  score_output_path: output/wise/show_o2_sft/summary.json
  mode: generate  # full | generate | score
  vlm_eval:
    enabled: true
    model_name: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
    max_new_tokens: 512
    max_retries: 2
  run_calculate: true

inference:
  backbone: show_o2
  backbone_cfg:
    vae_path: ${UMM_MODEL_CACHE}/show_o2/Wan2.1_VAE.pth
    model_path: ${UMM_POST_TRAIN_MODEL_CACHE}/post_train/show_o2/unwrapped_model
    show_o_root: ${UMM_CODEBASE}/model/Show-o
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      guidance_scale: 3.0
      generation_timesteps: 50
      batch_size: 1
