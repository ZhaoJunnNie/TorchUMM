eval:
  benchmark: imgedit

imgedit:
  origin_img_root: ${UMM_DATASETS}/imgedit/Benchmark
  out_dir: output/imgedit/deepgen
  mode: generate
  resume: true
  model_name: deepgen
  edit_type: all
  suite: all
  run_calculate: true
  score_output_path: output/imgedit/deepgen/summary.json
  vlm_eval:
    backbone: qwen25vl
    model_path: ${UMM_MODEL_CACHE}/evaluator/Qwen2.5-VL-72B-Instruct
inference:
  backbone: deepgen
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/deepgen/DeepGen-1.0-diffusers
    device: "cuda:0"
    torch_dtype: bfloat16
    seed: 42
