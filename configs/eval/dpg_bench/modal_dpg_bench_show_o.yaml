inference:
  infer_config: configs/inference/modal_show_o_generation.yaml

dpg_bench:
  prompts_dir: /workspace/eval/generation/dpg_bench/prompts
  image_output_dir: /outputs/dpg_bench/show_o
  resolution: 512
  # Switch to dpg env for benchmark scoring after generation (adjust to your env)
  eval_python: python
  score_output_path: /outputs/dpg_bench/show_o/final_score.json
  images_per_prompt: 4
  gpus: 1
  overwrite: false
  skip_eval: false
