inference:
  backbone: janus_flow
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/janus_flow/JanusFlow-1.3B
    janus_root: ${UMM_CODEBASE}/src/umm/backbones/janus_flow/Janus
    vae_path: ${UMM_MODEL_CACHE}/janus_flow/sdxl-vae
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      cfg_weight: 2.0
      num_inference_steps: 30
      parallel_size: 4
      img_size: 384

dpg_bench:
  prompts_dir: eval/generation/dpg_bench/prompts
  image_output_dir: output/dpg_bench/janus_flow
  resolution: 384
  score_output_path: output/dpg_bench/janus_flow/final_score.json
  images_per_prompt: 4
  gpus: 1
  overwrite: false
  skip_eval: false
