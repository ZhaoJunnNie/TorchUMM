inference:
  backbone: mmada
  backbone_cfg:
    model_path: /model_cache/mmada/MMaDA-8B-Base
    mmada_root: /workspace/model/MMaDA
    vq_model_path: /model_cache/mmada/magvitv2
    seed: 42

    generation_cfg:
      guidance_scale: 1.5
      temperature: 1.0
      timesteps: 12

dpg_bench:
  prompts_dir: /workspace/eval/generation/dpg_bench/prompts
  image_output_dir: /outputs/dpg_bench/mmada
  resolution: 512
  eval_python: python
  score_output_path: /outputs/dpg_bench/mmada/final_score.json
  images_per_prompt: 4
  gpus: 1
  overwrite: false
  skip_eval: false
