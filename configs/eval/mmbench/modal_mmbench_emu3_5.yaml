eval:
  benchmark: mmbench

inference:
  backbone: emu3_5
  backbone_cfg:
    model_path: /model_cache/emu3_5/Emu3.5
    vq_path: /model_cache/emu3_5/Emu3.5-VisionTokenizer
    emu3_5_root: /workspace/model/Emu3.5
    use_vllm: true
    tensor_parallel_size: 2
    gpu_memory_utilization: 0.7
    classifier_free_guidance: 2.0
    image_area: 518400

    generation_cfg:
      classifier_free_guidance: 2.0
      max_new_tokens: 512

    understanding_cfg:
      image_area: 518400

mmbench:
  datasets: [mmbench_dev_20230712]
  dataset_paths:
    mmbench_dev_20230712: /datasets/mmbench/mmbench_dev_20230712.tsv
  out_dir: /outputs/mmbench/emu3_5
  score_output_path: /outputs/mmbench/emu3_5/summary.json
  resume: true
