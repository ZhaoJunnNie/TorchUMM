eval:
  benchmark: mmbench

inference:
  backbone: show_o2
  backbone_cfg:
    vae_path: ${UMM_MODEL_CACHE}/show_o2/Wan2.1_VAE.pth
    version: 2
    model_path: ${UMM_MODEL_CACHE}/show_o2/show-o2-7B
    show_o_root: ${UMM_CODEBASE}/model/Show-o
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 2048
      do_sample: false
      use_clip_vit: true

mmbench:
  datasets: [mmbench_dev_20230712]
  out_dir: output/mmbench/show_o2
  score_output_path: output/mmbench/show_o2/summary.json
