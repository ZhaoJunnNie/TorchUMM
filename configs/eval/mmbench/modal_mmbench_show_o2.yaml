eval:
  benchmark: mmbench

inference:
  backbone: show-o2
  backbone_cfg:
    version: 2
    model_path: /model_cache/show_o2/show-o2-7B
    show_o_root: /workspace/model/Show-o
    vae_path: /model_cache/show_o2/Wan2.1_VAE.pth
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 10
      do_sample: false
      use_clip_vit: true

mmbench:
  datasets: [mmbench_dev_20230712]
  out_dir: /output-apr4/mmbench/show_o2-underN10
  score_output_path: /output-apr4/mmbench/show_o2-underN10/summary.json
