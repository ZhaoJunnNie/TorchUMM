eval:
  benchmark: mmbench

inference:
  backbone: mmada
  backbone_cfg:
    model_path: /model_cache/mmada/MMaDA-8B-Base
    mmada_root: /workspace/model/MMaDA
    vq_model_path: /model_cache/mmada/magvitv2
    seed: 42

    understanding_cfg:
      max_new_tokens: 2048
      steps: 256
      block_length: 128

mmbench:
  datasets: [mmbench_dev_20230712]
  dataset_paths:
    mmbench_dev_20230712: /datasets/mmbench/mmbench_dev_20230712.tsv
  out_dir: /outputs/mmbench/mmada
  score_output_path: /outputs/mmbench/mmada/summary.json
