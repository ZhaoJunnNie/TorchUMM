eval:
  benchmark: mmmu

inference:
  backbone: show-o2
  backbone_cfg:
    version: 2
    model_path: /model_cache/show_o2/show-o2-7B
    show_o_root: /workspace/model/Show-o
    vae_path: /model_cache/show_o2/Wan2.1_VAE.pth
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 256
      do_sample: false
      use_clip_vit: true

mmmu:
  root: MMMU/MMMU
  cache_dir: /workspace/data/MMMU
  datasets: [MMMU_validation]
  out_dir: /outputs/mmmu/show_o2
  score_output_path: /outputs/mmmu/show_o2/summary.json
  run_calculation: true
  max_images: 1
