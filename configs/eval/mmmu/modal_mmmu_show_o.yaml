eval:
  benchmark: mmmu

inference:
  backbone: show_o
  backbone_cfg:
    version: 1
    model_path: /model_cache/show_o/show-o-w-clip-vit-512x512
    show_o_root: /workspace/model/Show-o
    vq_model_path: /model_cache/show_o/magvitv2
    seed: 42
    torch_dtype: bfloat16
    understanding_cfg:
      max_new_tokens: 256
      do_sample: false
      use_clip_vit: true

mmmu:
  root: MMMU/MMMU
  cache_dir: /workspace/data/MMMU
  datasets: [MMMU_validation]
  out_dir: /output-apr4/mmmu/show_o-underN256
  score_output_path: /output-apr4/mmmu/show_o-underN256/summary.json
  run_calculation: true
  max_images: 1
