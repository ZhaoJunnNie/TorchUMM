eval:
  benchmark: geneval

geneval:
  mode: generate  # full | generate | score
  metadata_path: ${UMM_CODEBASE}/model/geneval/prompts/evaluation_metadata.jsonl
  out_dir: output/geneval/bagel
  geneval_root: ${UMM_CODEBASE}/model/geneval
  images_per_prompt: 4
  max_samples: 0
  resume: true
  score_output_path: output/geneval/bagel/summary.json
  vlm_eval:
    enabled: false
    max_new_tokens: 512
    max_retries: 2
  detection_eval:
    enabled: true
    model_path: ${UMM_MODEL_CACHE}/evaluator
  run_scoring: true

inference:
  backbone: bagel
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/bagel/BAGEL-7B-MoT
    bagel_root: ${UMM_CODEBASE}/model/Bagel
    max_mem_per_gpu: "80GiB"
    offload_folder: ./tmp/offload
    seed: 42
    generation_cfg:
      cfg_text_scale: 4.0
      cfg_img_scale: 1.0
      num_timesteps: 50
