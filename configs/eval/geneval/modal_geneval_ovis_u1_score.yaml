eval:
  benchmark: geneval

geneval:
  geneval_root: /workspace/model/geneval
  metadata_path: /workspace/model/geneval/prompts/evaluation_metadata.jsonl
  out_dir: /output-apr4/geneval/ovis_u1
  images_per_prompt: 4
  max_samples: 0
  resume: true
  score_output_path: /output-apr4/geneval/ovis_u1/summary.json
  mode: score
  vlm_eval:
    enabled: false
    max_new_tokens: 512
    max_retries: 2
  detection_eval:
    enabled: true
    model_path: /model_cache/evaluator
  run_scoring: true

  score_model: geneval
  score_gpu: "A100-80GB"
inference:
  backbone: ovis_u1
  backbone_cfg:
    model_path: /model_cache/ovis_u1/Ovis-U1-3B
