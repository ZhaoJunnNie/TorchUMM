eval:
  benchmark: geneval

geneval:
  geneval_root: /workspace/model/geneval
  metadata_path: /workspace/model/geneval/prompts/evaluation_metadata.jsonl
  out_dir: /outputs/geneval/mmada
  images_per_prompt: 4
  max_samples: 0
  resume: true
  score_output_path: /outputs/geneval/mmada/summary.json
  mode: score
  score_model: wise
  score_gpu: "A100-80GB"
  vlm_eval:
    enabled: false
  detection_eval:
    enabled: true
    model_path: /model_cache/evaluator
  run_scoring: true

inference:
  backbone: mmada
  backbone_cfg:
    model_path: /model_cache/mmada/MMaDA-8B-Base
    mmada_root: /workspace/model/MMaDA
    vq_model_path: /model_cache/mmada/magvitv2
    seed: 42
