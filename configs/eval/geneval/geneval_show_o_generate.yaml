eval:
  benchmark: geneval
geneval:
  mode: generate  # full | generate | score
  metadata_path: ${UMM_CODEBASE}/model/geneval/prompts/evaluation_metadata.jsonl
  out_dir: output/geneval/show_o
  geneval_root: ${UMM_CODEBASE}/model/geneval
  images_per_prompt: 4
  max_samples: 0
  resume: true
  score_output_path: output/geneval/show_o/summary.json
  vlm_eval:
    enabled: false
    max_new_tokens: 512
    max_retries: 2
  detection_eval:
    enabled: true
    model_path: ${UMM_MODEL_CACHE}/evaluator
  run_scoring: true

inference:
  backbone: show_o
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/show_o/show-o-w-clip-vit-512x512
    show_o_root: ${UMM_CODEBASE}/model/Show-o
    vq_model_path: ${UMM_MODEL_CACHE}/show_o/magvitv2
    version: 1
    seed: 42
    torch_dtype: bfloat16
    generation_cfg:
      guidance_scale: 3.0
      generation_timesteps: 50
      batch_size: 1
