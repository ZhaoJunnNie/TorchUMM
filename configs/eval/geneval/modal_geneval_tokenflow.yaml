eval:
  benchmark: geneval

geneval:
  geneval_root: /workspace/model/geneval
  metadata_path: /workspace/model/geneval/prompts/evaluation_metadata.jsonl
  out_dir: /outputs/geneval/tokenflow
  images_per_prompt: 4
  max_samples: 0
  resume: true
  score_output_path: /outputs/geneval/tokenflow/summary.json
  mode: full  # full | generate | score
  score_model: wise
  score_gpu: "A100-80GB"
  vlm_eval:
    enabled: false
    max_new_tokens: 512
    max_retries: 2
  detection_eval:
    enabled: true
    model_path: /model_cache/evaluator
  run_scoring: true

inference:
  backbone: tokenflow
  backbone_cfg:
    model_path: /model_cache/tokenflow/TokenFlow-t2i
    tokenizer_path: /model_cache/tokenflow/TokenFlow/tokenflow_clipb_32k_enhanced.pt
    tokenflow_root: /workspace/model/TokenFlow
    cfg: 7.5
    loop: 1
    mixed_precision: bf16
    batch_size: 1
