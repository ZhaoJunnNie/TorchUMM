eval:
  benchmark: geneval
geneval:
  geneval_root: ${UMM_CODEBASE}/model/geneval
  metadata_path: ${UMM_CODEBASE}/model/geneval/prompts/evaluation_metadata.jsonl
  out_dir: output/geneval/emu3
  images_per_prompt: 4
  max_samples: 0
  resume: true
  score_output_path: output/geneval/emu3/summary.json
  mode: generate  # full | generate | score
  vlm_eval:
    enabled: false
    max_new_tokens: 512
    max_retries: 2
  detection_eval:
    enabled: true
    model_path: ${UMM_MODEL_CACHE}/evaluator
  run_scoring: true

inference:
  backbone: emu3
  backbone_cfg:
    model_path: ${UMM_MODEL_CACHE}/emu3/Emu3-Gen
    vq_hub: ${UMM_MODEL_CACHE}/emu3/Emu3-VisionTokenizer
    emu_root: ${UMM_CODEBASE}/model/Emu3
    device: "cuda:0"
    device_map: "cuda:0"
    torch_dtype: bfloat16
    attn_implementation: flash_attention_2
    generation_cfg:
      max_new_tokens: 40960
      classifier_free_guidance: 3.0
